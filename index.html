<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alamin BD AT OS Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="desktop">

<div id="windowArea"></div>

<div class="desktopIcons">
<div class="icon" id="fileExplorer">📁<br>Explorer</div>
<div class="icon" id="browser">🌐<br>Browser</div>
<div class="icon" id="notepad">📝<br>Notepad</div>
<div class="icon" id="settings">⚙️<br>Settings</div>
<div class="icon" id="garments">🏭<br>Garments</div>
</div>

<div id="startMenu">
<div id="openExplorer">📁 File Explorer</div>
<div id="openBrowser">🌐 Browser</div>
<div id="openNotepad">📝 Notepad</div>
<div id="openSettings">⚙️ Settings</div>
<div id="openGarments">🏭 Garments</div>
</div>

<div id="taskbar">
<button id="startButton">⊞</button>
<span>Alamin BD AT OS Pro</span>
<span id="clock"></span>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
